name: Capture prompts

on:
  workflow_dispatch:
  schedule:
    - cron: "37 */2 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GH_TOKEN: ${{ github.token }}

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --all-groups
      - run: uv run ruff format --check phistory tests
      - run: uv run ruff check phistory tests
      - run: uv run pytest
      - run: uv build
      - run: uv run phistory --root /tmp/phistory-smoke --cache-dir /tmp/phistory-smoke-cache capture --latest --agents claude-code,codex,antigravity,openclaw,hermes,kimi,opencode,pi --force --summary-title "Smoke capture"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-captures
          path: /tmp/phistory-smoke
          retention-days: 7
      - run: uv run phistory capture --latest --agents claude-code,codex,antigravity,openclaw,hermes,kimi,opencode,pi --summary-title "Latest capture"
      - run: uv run phistory extract-static claude-code --latest-captured 10
      - run: uv run phistory render-index
      - run: uv run phistory render-site
      - name: Commit capture updates
        run: |
          if git diff --quiet; then
            echo "No capture changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README_zh.md index.html docs captures
          git commit -m "Capture latest prompt snapshots"
          git push
