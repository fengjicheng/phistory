name: Capture prompts

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --all-groups
      - run: uv run ruff format --check phistory tests
      - run: uv run ruff check phistory tests
      - run: uv run pytest
      - run: uv run phistory --root /tmp/phistory-smoke --cache-dir /tmp/phistory-smoke-cache capture --latest --agents claude-code,codex --force
      - run: uv run phistory capture --latest --agents claude-code,codex
      - run: uv run phistory render-index
      - name: Commit capture updates
        run: |
          if git diff --quiet; then
            echo "No capture changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md captures
          git commit -m "Capture latest prompt snapshots"
          git push
